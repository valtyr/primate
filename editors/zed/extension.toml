id = "primate"
name = "primate"
description = "Language support for the primate constant DSL"
version = "0.1.4"
schema_version = 1
authors = ["Valtýr Örn Kjartansson <valtyr@gmail.com>"]
repository = "https://github.com/valtyr/primate"

[language_servers.primate]
name = "primate"
languages = ["primate"]

[grammars.primate]
# Tree-sitter grammar lives in this same repo, under
# editors/zed/tree-sitter-primate. The Zed registry resolves the grammar
# by cloning the repository and checking out the given rev.
repository = "https://github.com/valtyr/primate"
rev        = "main"
path       = "editors/zed/tree-sitter-primate"
